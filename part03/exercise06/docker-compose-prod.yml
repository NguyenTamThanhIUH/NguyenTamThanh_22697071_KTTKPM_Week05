version: '3.8'

services:
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_prod
    ports:
      - "8000:8000"
    environment:
      FLASK_ENV: production
    restart: always

  nginx-prod:
    image: nginx:latest
    container_name: nginx_prod
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-prod
    restart: always
