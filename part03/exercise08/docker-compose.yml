version: '3.8'

services:
  django:
    image: python:3.11
    container_name: django_app
    working_dir: /app
    volumes:
      - ./django_app:/app
    environment:
      DEBUG: "True"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "8000:8000"
    command: sh -c "pip install django celery redis && python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - redis
    networks:
      - django_network
    restart: always

  celery-worker:
    image: python:3.11
    container_name: celery_worker
    working_dir: /app
    volumes:
      - ./django_app:/app
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: sh -c "pip install django celery redis && celery -A config worker -l info"
    depends_on:
      - redis
      - django
    networks:
      - django_network
    restart: always

  celery-beat:
    image: python:3.11
    container_name: celery_beat
    working_dir: /app
    volumes:
      - ./django_app:/app
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: sh -c "pip install django celery redis && celery -A config beat -l info"
    depends_on:
      - redis
      - django
    networks:
      - django_network
    restart: always

  redis:
    image: redis:latest
    container_name: redis_broker
    ports:
      - "6379:6379"
    networks:
      - django_network
    restart: always

networks:
  django_network:
    driver: bridge
