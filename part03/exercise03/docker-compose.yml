version: '3.8'

services:
  flask1:
    image: python:3.11
    container_name: flask_app_1
    working_dir: /app
    volumes:
      - ./app:/app
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
      APP_PORT: 5000
    command: sh -c "pip install flask && python app.py 5000"
    networks:
      - flask_network
    restart: always

  flask2:
    image: python:3.11
    container_name: flask_app_2
    working_dir: /app
    volumes:
      - ./app:/app
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
      APP_PORT: 5001
    command: sh -c "pip install flask && python app.py 5001"
    networks:
      - flask_network
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx_lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flask1
      - flask2
    networks:
      - flask_network
    restart: always

networks:
  flask_network:
    driver: bridge
