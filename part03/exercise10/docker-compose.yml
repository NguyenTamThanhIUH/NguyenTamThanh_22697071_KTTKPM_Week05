version: '3.8'

services:
  traefik:
    image: traefik:v2.10
    container_name: traefik_proxy
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8180:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik_network
    restart: always

  flask-app:
    image: python:3.11
    container_name: flask_traefik
    working_dir: /app
    volumes:
      - ./flask_app:/app
    environment:
      FLASK_APP: app.py
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flask.rule=Host(`flask.localhost`)"
      - "traefik.http.services.flask.loadbalancer.server.port=5000"
    command: sh -c "pip install flask && python app.py"
    networks:
      - traefik_network
    restart: always

  wordpress:
    image: wordpress:latest
    container_name: wordpress_traefik
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: wordpress_user
      WORDPRESS_DB_PASSWORD: wordpress_pass
      WORDPRESS_DB_NAME: wordpress_db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wordpress.rule=Host(`wordpress.localhost`)"
      - "traefik.http.services.wordpress.loadbalancer.server.port=80"
    depends_on:
      - mysql
    networks:
      - traefik_network
    restart: always

  mysql:
    image: mysql:5.7
    container_name: mysql_traefik
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: wordpress_db
      MYSQL_USER: wordpress_user
      MYSQL_PASSWORD: wordpress_pass
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - traefik_network
    restart: always

networks:
  traefik_network:
    driver: bridge

volumes:
  mysql_data:
