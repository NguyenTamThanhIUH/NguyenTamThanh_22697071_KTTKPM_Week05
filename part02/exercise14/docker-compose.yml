version: '3.8'

services:
  app1:
    image: nginx:latest
    container_name: app1_container
    networks:
      - custom_network
    ports:
      - "8085:80"
    restart: always

  app2:
    image: nginx:latest
    container_name: app2_container
    networks:
      - custom_network
    ports:
      - "8086:80"
    restart: always

networks:
  custom_network:
    driver: bridge
