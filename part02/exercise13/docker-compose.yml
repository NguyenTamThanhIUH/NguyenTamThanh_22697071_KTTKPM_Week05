version: '3.8'

services:
  react:
    image: node:20
    container_name: react_app
    working_dir: /app
    volumes:
      - ./app:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx_react
    depends_on:
      - react
    ports:
      - "8084:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    restart: always
